networks:
  fl-net:
    driver: bridge

services:
  fl-api:
    build: .
    container_name: fl-api-server
    command: python3 scratch/main.py --port 5000
    networks:
      - fl-net
    volumes:
      - .:/app

  ns3-simulation:
    build: .
    container_name: ns3-simulation-runner
    depends_on:
      - fl-api
    networks:
      - fl-net
    environment:
      FL_API_URL: "http://fl-api:5000"
    # Using $$ to escape the variable for the container's shell
    command: >
      bash -c "
        set -e;
        
        echo '--- [DEBUG] Inside container, the shell sees FL_API_URL as: $$FL_API_URL ---';
        
        echo 'Configuring and building ns-3 simulation...';
        ./ns3 configure;
        ./ns3 build;

        echo 'Waiting for FL API server...';
        # The while loop now uses the correctly escaped variable
        while ! curl -s --fail \"$$FL_API_URL/ping\" > /dev/null; do
          echo '...still waiting...';
          sleep 2;
        done;

        echo 'FL API server is responsive. Starting ns-3 simulation.';
        ./ns3 run \"simulation\";
      "
    volumes:
      - .:/app
      - ./results:/app/results